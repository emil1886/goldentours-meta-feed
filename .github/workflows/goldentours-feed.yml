name: Build Golden Tours Meta feed

# Rebuilds the GBP feed daily from the live site and deploys ./docs to GitHub
# Pages (artifact-based deployment - no Jekyll). Also commits the refreshed feed
# back to main for history/transparency.
#
# Currency: the site prices by IP by default, BUT its on-page currency selector
# is a POST (form#currform -> POST curr=<code>) that makes the server issue a
# "blessed" currency cookie which then sticks for the whole session, regardless
# of egress IP. The crawler mirrors this (establish_currency), so it renders GBP
# even from GitHub's US-based runners - no UK proxy or UK box required. The
# strict-currency guard still refuses to write if GBP ever fails to take.

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC daily (GitHub may delay scheduled runs)
  workflow_dispatch: {}    # manual "Run workflow" button

permissions:
  contents: write          # commit the regenerated feed back to main
  pages: write             # deploy to GitHub Pages
  id-token: write          # OIDC token for the Pages deployment

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Build feed (GBP via POST currency selector, strict guards) into ./docs
        run: |
          python goldentours_meta_feed_gbp.py \
            --currency GBP \
            --strict-currency \
            --min-products 300 \
            --out-dir docs
          # On abort (wrong currency / too few products) the job fails here and
          # nothing is deployed, so the previously published feed stays untouched.

      - name: Commit refreshed feed to main (history)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/goldentours_meta_feed.csv docs/goldentours_meta_feed.xml
          if git diff --cached --quiet; then
            echo "No feed changes today."
          else
            git commit -m "Daily feed refresh"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
