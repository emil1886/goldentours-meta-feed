name: Build Golden Tours Meta feed

# Rebuilds the GBP feed daily from the live site and commits it into ./docs,
# which GitHub Pages serves at a public URL Meta can read.
#
# IMPORTANT: the site prices by IP geolocation, so the crawl MUST egress from a
# UK IP. GitHub's hosted runners are US-based, so this routes requests through a
# UK proxy supplied via the repo secret UK_PROXY. Without it the crawl returns
# USD and the strict-currency guard refuses to write (last good feed stays live).

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC daily (GitHub may delay scheduled runs)
  workflow_dispatch: {}    # manual "Run workflow" button

permissions:
  contents: write          # commit the regenerated feed back to main

concurrency:
  group: feed-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Build feed (GBP via UK proxy, strict guards) into ./docs
        env:
          UK_PROXY: ${{ secrets.UK_PROXY }}
        run: |
          if [ -z "$UK_PROXY" ]; then
            echo "::error::Repo secret UK_PROXY is not set. The crawl would run from GitHub's US IP and return USD, which the strict-currency guard rejects. Add a UK proxy URL under Settings -> Secrets and variables -> Actions -> New repository secret (name: UK_PROXY)."
            exit 1
          fi
          python goldentours_meta_feed_gbp.py \
            --currency GBP \
            --proxy "$UK_PROXY" \
            --strict-currency \
            --min-products 300 \
            --out-dir docs
          # On abort (wrong currency / too few products) the job fails here and
          # nothing is committed, so the previously published feed stays untouched.

      - name: Commit & push if the feed changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/goldentours_meta_feed.csv docs/goldentours_meta_feed.xml
          if git diff --cached --quiet; then
            echo "No feed changes today."
          else
            git commit -m "Daily feed refresh"
            git push
          fi
